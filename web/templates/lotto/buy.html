{% extends 'base.html' %}

{% block content %}
<div class="card">
    <h2>🎟️ 복권 구매</h2>
    <br>
    {% if pending_draw %}
        <p style="color: #666;">{{ pending_draw.round_no }}회 | 추첨 예정일: {{ pending_draw.draw_date }}</p>
        <br>
        <form method="post" id="buyForm">
            {% csrf_token %}
            <label>구매 방식</label>
            <div style="display: flex; gap: 1rem; margin-bottom: 1rem;">
                <label style="font-weight: normal; display: flex; align-items: center; gap: 0.3rem;">
                    <input type="radio" name="purchase_type" value="auto" checked> 🎲 자동 선택
                </label>
                <label style="font-weight: normal; display: flex; align-items: center; gap: 0.3rem;">
                    <input type="radio" name="purchase_type" value="manual"> ✏️ 수동 선택
                </label>
            </div>

            <div id="manual-inputs" style="display: none;">
                <label>번호 직접 입력 (1~45, 6개)</label>
                <div style="display: flex; gap: 0.5rem; flex-wrap: wrap;">
                    {% for i in "123456" %}
                        <input type="number" name="num{{ i }}" min="1" max="45"
                               style="width: 70px; text-align: center;"
                               placeholder="{{ i }}번">
                    {% endfor %}
                </div>
                <p id="error-msg" style="color: #e74c3c; margin-top: 0.5rem; display: none;"></p>
                <br>
            </div>

            <button type="submit" class="btn btn-gold" style="width: 100%;">
                🎰 구매하기 (1,000원)
            </button>
        </form>
    {% else %}
        <p style="color: #e74c3c;">⚠️ 현재 구매 가능한 회차가 없습니다.</p>
    {% endif %}
</div>

<script>
    const radios = document.querySelectorAll('input[name="purchase_type"]');
    const manualDiv = document.getElementById('manual-inputs');
    const errorMsg = document.getElementById('error-msg');
    const form = document.getElementById('buyForm');

    radios.forEach(r => r.addEventListener('change', () => {
        manualDiv.style.display = r.value === 'manual' && r.checked ? 'block' : 'none';
        if (r.value === 'auto' && r.checked) manualDiv.style.display = 'none';
    }));

    form.addEventListener('submit', function(e) {
        const type = document.querySelector('input[name="purchase_type"]:checked').value;
        if (type !== 'manual') return;

        const nums = [];
        for (let i = 1; i <= 6; i++) {
            const val = parseInt(document.querySelector(`input[name="num${i}"]`).value);
            nums.push(val);
        }

        // 빈 값 체크
        if (nums.some(isNaN)) {
            e.preventDefault();
            errorMsg.textContent = '⚠️ 6개 번호를 모두 입력해주세요.';
            errorMsg.style.display = 'block';
            return;
        }

        // 범위 체크
        if (nums.some(n => n < 1 || n > 45)) {
            e.preventDefault();
            errorMsg.textContent = '⚠️ 번호는 1~45 사이여야 합니다.';
            errorMsg.style.display = 'block';
            return;
        }

        // 중복 체크
        if (new Set(nums).size !== 6) {
            e.preventDefault();
            errorMsg.textContent = '⚠️ 중복된 번호가 있습니다. 서로 다른 6개 번호를 입력해주세요.';
            errorMsg.style.display = 'block';
            return;
        }

        errorMsg.style.display = 'none';
    });
</script>
{% endblock %}
