<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎰 Lucky Lotto</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; color: #333; }
        .navbar {
            background: #1a3a5c; color: white; padding: 1rem 2rem;
            display: flex; justify-content: space-between; align-items: center;
        }
        .navbar a { color: white; text-decoration: none; margin-left: 1rem; font-size: 0.95rem; }
        .navbar a:hover { color: #d4af37; }
        .navbar .logo { font-size: 1.4rem; font-weight: bold; color: #d4af37; }
        .container { max-width: 900px; margin: 2rem auto; padding: 0 1rem; }
        .card {
            background: white; border-radius: 12px;
            padding: 2rem; margin-bottom: 1.5rem;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        .card h2 { color: #1a3a5c; margin-bottom: 1rem; }
        .btn {
            display: inline-block; padding: 0.6rem 1.4rem;
            border-radius: 8px; border: none; cursor: pointer;
            font-size: 1rem; text-decoration: none; font-weight: bold;
        }
        .btn-primary { background: #1a3a5c; color: white; }
        .btn-primary:hover { background: #2a5a8c; }
        .btn-gold { background: #d4af37; color: #1a3a5c; }
        .btn-gold:hover { background: #c49e27; }
        .btn-danger { background: #e74c3c; color: white; }
        .messages { margin-bottom: 1rem; }
        .message {
            padding: 0.8rem 1rem; border-radius: 8px; margin-bottom: 0.5rem;
            background: #d4edda; color: #155724; border: 1px solid #c3e6cb;
        }
        .message.error { background: #f8d7da; color: #721c24; border-color: #f5c6cb; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #1a3a5c; color: white; padding: 0.7rem; text-align: left; }
        td { padding: 0.7rem; border-bottom: 1px solid #eee; }
        tr:hover { background: #f8f9fa; }
        .badge {
            display: inline-block; padding: 0.2rem 0.6rem;
            border-radius: 20px; font-size: 0.8rem; font-weight: bold;
        }
        .badge-gold { background: #d4af37; color: #1a3a5c; }
        .badge-gray { background: #eee; color: #666; }
        input[type=number], input[type=text], input[type=email], input[type=password] {
            width: 100%; padding: 0.6rem; border: 1px solid #ddd;
            border-radius: 8px; font-size: 1rem; margin-bottom: 0.8rem;
        }
        label { font-weight: bold; display: block; margin-bottom: 0.3rem; color: #1a3a5c; }
    </style>
</head>
<body>
    <nav class="navbar">
        <span class="logo">🎰 Lucky Lotto</span>
        <div>
            {% if user.is_authenticated %}
                <span>👤 {{ user.username }}</span>
                {% if user.is_staff %}
                    <a href="{% url 'lotto:admin_dashboard' %}">관리자</a>
                {% endif %}
                <a href="{% url 'lotto:home' %}">홈</a>
                <a href="{% url 'lotto:buy' %}">구매</a>
                <a href="{% url 'lotto:my_tickets' %}">내 티켓</a>
                <form method="post" action="{% url 'accounts:logout' %}" style="display:inline;">
                {% csrf_token %}
                <button type="submit" style="background:none; border:none; color:white; cursor:pointer; font-size:0.95rem;">로그아웃</button>
    </form>
            {% else %}
                <a href="{% url 'accounts:login' %}">로그인</a>
                <a href="{% url 'accounts:register' %}">회원가입</a>
            {% endif %}
        </div>
    </nav>

    <div class="container">
        {% if messages %}
        <div class="messages">
            {% for message in messages %}
                <div class="message {% if message.tags == 'error' %}error{% endif %}">
                    {{ message }}
                </div>
            {% endfor %}
        </div>
        {% endif %}

        {% block content %}{% endblock %}
    </div>
</body>
</html>
